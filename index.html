<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#1e3a5f"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <title>SPL DPR</title>
    <link rel="manifest" href="/manifest.webmanifest"/>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
    <link rel="icon" type="image/png" href="/icon-192.png"/>
    <meta name="apple-mobile-web-app-title" content="SPL DPR"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <style>
      :root{ --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      *{ box-sizing: border-box; }
      html, body{ margin:0; padding:0; }
      html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
      body{ font-family: var(--font-sans); -webkit-font-smoothing: antialiased; background:#f8fafc; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
      button, input, select, textarea{ font-family: inherit; }
      button{ touch-action: manipulation; }
      /* Mobile: keep inputs at 16px so iOS never zooms on focus */
      @media (max-width: 767px){
        input, select, textarea{ font-size:16px !important; }
      }
    </style>
    <script>
      // Clean up any legacy CACHES (old caching SWs served stale content), then
      // register the current network-only service worker so the app is installable
      // ("Add to Home Screen") without ever caching stale content.
      if('caches'in window)caches.keys().then(k=>k.forEach(c=>caches.delete(c)));
      if('serviceWorker'in navigator){
        window.addEventListener('load',()=>{
          navigator.serviceWorker.register('/sw.js').catch(()=>{});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
